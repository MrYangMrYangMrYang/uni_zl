name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  # ====== 阶段 1：代码规范 ======
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'
      - run: npm ci
      - run: npm run lint

  # ====== 阶段 2：单元测试 + 覆盖率 ======
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'
      - run: npm ci
      - run: npm test -- --coverage
      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

  # ====== 阶段 3：构建验证 ======
  build:
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'
      - run: npm ci
      - run: npm run build:h5
      - name: Upload H5 build
        uses: actions/upload-artifact@v4
        with:
          name: h5-dist
          path: dist/build/h5/
          retention-days: 7
      - run: npm run build:mp-weixin
      - name: Upload 小程序 build
        uses: actions/upload-artifact@v4
        with:
          name: mp-weixin-dist
          path: dist/dev/mp-weixin/
          retention-days: 7
