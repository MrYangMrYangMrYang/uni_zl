<!-- ⚠️ 本文件与 public/index.html 保持同步，修改时请一并更新 -->
<!DOCTYPE html>
<html lang="zh-CN">
<head>
	<meta charset="utf-8">
	<meta http-equiv="X-UA-Compatible" content="IE=edge">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<!-- PWA -->
	<link rel="manifest" href="/manifest.json">
	<meta name="theme-color" content="#0173de">
	<link rel="apple-touch-icon" href="/static/icons/zl.svg">
	<meta name="description" content="知了论坛 - IT技术问答社区，专注于技术交流的跨平台社区应用">
	<meta name="keywords" content="知了论坛,社区问答,技术交流,编程问答,IT社区">
	<meta name="author" content="知了论坛">

	<!-- Apple Web App -->
	<meta name="apple-mobile-web-app-capable" content="yes">
	<meta name="apple-mobile-web-app-status-bar-style" content="default">
	<meta name="format-detection" content="telephone=no, email=no">

	<!-- Security Headers -->
	<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline' https://at.alicdn.com; img-src 'self' data: http: https:; connect-src 'self' http: https:; font-src 'self' data: https://at.alicdn.com;">
	<meta http-equiv="X-Content-Type-Options" content="nosniff">
	<meta http-equiv="Referrer-Policy" content="strict-origin-when-cross-origin">

	<!-- Open Graph / Social -->
	<meta property="og:type" content="website">
	<meta property="og:title" content="知了论坛 - IT技术问答社区">
	<meta property="og:description" content="知了论坛，一个专注于技术交流的跨平台社区问答应用">
	<meta property="og:image" content="<%= BASE_URL %>static/zl.svg">
	<meta property="og:url" content="<%= htmlWebpackPlugin.options.url || '' %>">
	<meta name="twitter:card" content="summary">

	<!-- Performance: preconnect to API domain -->
	<link rel="preconnect" href="<%= VUE_APP_DOMAIN || '' %>" crossorigin>
	<link rel="dns-prefetch" href="<%= VUE_APP_DOMAIN || '' %>">

	<link rel="icon" href="<%= BASE_URL %>static/zl.svg" type="image/svg+xml">
	<title><%= htmlWebpackPlugin.options.title %></title>

	<!-- 非阻塞 CSS 加载：media="print" 让浏览器以低优先级加载，onload 后切换到 all -->
	<link rel="stylesheet" href="<%= BASE_URL %>static/index.<%= VUE_APP_INDEX_CSS_HASH %>.css" media="print" onload="this.media='all'">
	<noscript><link rel="stylesheet" href="<%= BASE_URL %>static/index.<%= VUE_APP_INDEX_CSS_HASH %>.css"></noscript>

	<!-- JSON-LD 结构化数据 -->
	<script type="application/ld+json">
	{
		"@context": "https://schema.org",
		"@type": "WebSite",
		"name": "知了论坛",
		"description": "IT技术问答社区",
		"url": "<%= htmlWebpackPlugin.options.url || '' %>",
		"potentialAction": {
			"@type": "SearchAction",
			"target": "<%= htmlWebpackPlugin.options.url || '' %>?keywords={search_term_string}",
			"query-input": "required name=search_term_string"
		}
	}
	</script>
</head>
<body>
	<noscript>
		<strong>请启用 JavaScript 以继续访问</strong>
	</noscript>
	<div id="app"></div>
<script>
if ("serviceWorker" in navigator) {
    window.addEventListener("load", function() {
        navigator.serviceWorker.register("/sw.js").then(function(reg) {
            console.log("[PWA] Service Worker registered:", reg.scope);
            // 检测到新 SW 时自动刷新，避免缓存导致的旧版本残留
            reg.onupdatefound = function() {
                var installing = reg.installing;
                installing.onstatechange = function() {
                    if (installing.state === "installed" && navigator.serviceWorker.controller) {
                        console.log("[PWA] New version available, reloading...");
                        window.location.reload();
                    }
                };
            };
        }).catch(function(err) {
            console.warn("[PWA] Service Worker registration failed:", err);
        });
    });
}
</script>
</body>
</html>
